# Booking Service Configuration

spring.application.name=booking-service
server.port=8082

# Database Configuration
spring.datasource.url=jdbc:postgresql://postgres:5432/cloud_todoai
spring.datasource.username=admin
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwtSecret=mySecretKeyThatIsAtLeast32CharactersLongForHS256Algorithm
app.jwtExpirationMs=86400000

# External Services
user.service.url=http://user-service:8081

# OpenAI Configuration (потребує OPENAI_API_KEY)
openai.api.key=${OPENAI_API_KEY:}
openai.api.model=gpt-3.5-turbo

# Logging
logging.level.root=INFO
logging.level.com.example.demo=DEBUG

# Swagger/OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
spring.h2.console.path=/h2-console