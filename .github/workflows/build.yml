name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin123
          POSTGRES_DB: cloud_todoai
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Cache Maven packages
      uses: actions/cache@v3
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: Build User Service
      working-directory: ./user-service
      run: mvn clean package

    - name: Build Booking Service
      working-directory: ./booking-service
      run: mvn clean package

    - name: Test User Service
      working-directory: ./user-service
      run: mvn test

    - name: Test Booking Service
      working-directory: ./booking-service
      run: mvn test

  docker-build:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker images
      run: |
        docker build -f user-service/Dockerfile -t cloud-todoai-user:latest ./user-service
        docker build -f booking-service/Dockerfile -t cloud-todoai-booking:latest ./booking-service
        docker build -f Dockerfile.frontend -t cloud-todoai-frontend:latest .

    - name: Test Docker Compose
      run: |
        docker-compose up -d
        sleep 10
        docker-compose ps
        docker-compose down

  notify:
    runs-on: ubuntu-latest
    needs: [ build, docker-build ]
    if: always()

    steps:
    - name: Build Status
      run: echo "Build Status: ${{ job.status }}"
